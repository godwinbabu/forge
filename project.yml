name: Forge
options:
  bundleIdPrefix: app.forge
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: "3WZ27HVC5C"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  ArgumentParser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.5.0"

targets:
  ForgeKit:
    type: framework
    platform: macOS
    sources:
      - path: ForgeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.forge.ForgeKit
        PRODUCT_MODULE_NAME: ForgeKit
        GENERATE_INFOPLIST_FILE: true
        DEFINES_MODULE: true

  Forge:
    type: application
    platform: macOS
    sources:
      - path: Forge
        excludes:
          - "**/*.entitlements"
    resources:
      - path: Forge/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.forge.Forge
        DEFINES_MODULE: true
        PRODUCT_MODULE_NAME: Forge
        ENABLE_TESTING_SEARCH_PATHS: true
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_CFBundleDisplayName: Forge
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        CODE_SIGN_ENTITLEMENTS: Forge/Forge.entitlements
        ENABLE_HARDENED_RUNTIME: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - target: ForgeKit
        embed: true
      - target: ForgeFilterExtension
        embed: true
        codeSign: true
      - target: ForgeWidget
        embed: true
        codeSign: true
        copy:
          destination: plugins
      - package: Sparkle

  ForgeFilterExtension:
    type: system-extension
    platform: macOS
    sources:
      - path: ForgeFilterExtension
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.forge.Forge.ForgeFilterExtension
        CODE_SIGN_ENTITLEMENTS: ForgeFilterExtension/ForgeFilterExtension.entitlements
        ENABLE_HARDENED_RUNTIME: true
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: ForgeFilterExtension/Info.plist
        SYSTEM_EXTENSION_INSTALL_CODE_SIGN_IDENTITY: ""
        OTHER_LDFLAGS: "$(inherited) -lEndpointSecurity"
    dependencies:
      - target: ForgeKit
        embed: false
    frameworks:
      - NetworkExtension.framework
      - Network.framework

  forge-cli:
    type: tool
    platform: macOS
    sources:
      - path: forge-cli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.forge.cli
        PRODUCT_NAME: forge
        ENABLE_HARDENED_RUNTIME: true
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - package: ArgumentParser

  ForgeWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: ForgeWidget
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.forge.Forge.ForgeWidget
        CODE_SIGN_ENTITLEMENTS: ForgeWidget/ForgeWidget.entitlements
        ENABLE_HARDENED_RUNTIME: true
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    frameworks:
      - WidgetKit.framework
      - SwiftUI.framework

  ForgeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ForgeTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.forge.ForgeTests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: ForgeKit

  ForgeIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ForgeIntegrationTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.forge.ForgeIntegrationTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Forge.app/Contents/MacOS/Forge"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Forge

  ForgeUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: ForgeUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.forge.ForgeUITests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Forge

schemes:
  Forge:
    build:
      targets:
        Forge: all
        ForgeKit: all
        ForgeFilterExtension: all
        ForgeWidget: all
        forge-cli: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ForgeTests
        - ForgeIntegrationTests
    profile:
      config: Release
    archive:
      config: Release

  ForgeKit:
    build:
      targets:
        ForgeKit: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ForgeTests

  forge-cli:
    build:
      targets:
        forge-cli: all
    run:
      config: Debug
